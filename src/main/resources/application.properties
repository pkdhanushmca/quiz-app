spring.application.name=quiz

# ---- MySQL connection ----
# Update these to match your local/remote MySQL instance.
#spring.datasource.url=jdbc:mysql://localhost:3306/quizdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.username=root
#spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=${SPRING_DATASOURCE_URL}useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ---- JPA / Hibernate ----
# 'validate' is safest once schema.sql (database/schema.sql) has been run manually.
# Use 'update' only in local dev if you don't want to manage schema.sql by hand.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# Store java.util.UUID fields as CHAR(36) text instead of MySQL's default binary(16)
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR

# ---- Server ----
server.port=${PORT:8080}
